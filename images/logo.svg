<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 540" width="500" height="540">
  <rect width="500" height="540" fill="#ffffff"/>

  <!-- ── Outer orbit ring (dashed, like VulZoo) ── -->
  <circle cx="250" cy="215" r="170" fill="none" stroke="#111" stroke-width="11"
    stroke-dasharray="20,13" stroke-linecap="round"/>

  <!-- ── Solid black inner disk ── -->
  <circle cx="250" cy="215" r="122" fill="#111"/>

  <!-- ══════════════════════════════════════
       MAGNIFYING GLASS (white cutout)
  ══════════════════════════════════════ -->
  <!-- lens ring -->
  <circle cx="237" cy="202" r="72" fill="none" stroke="#fff" stroke-width="14"/>
  <!-- lens fill (white) -->
  <circle cx="237" cy="202" r="58" fill="#fff"/>
  <!-- handle -->
  <line x1="286" y1="251" x2="320" y2="285" stroke="#fff" stroke-width="17"
    stroke-linecap="round"/>

  <!-- ══════════════════════════════════════
       BROKEN ELEMENT SELECTOR inside lens
       — a crumbling `<div>` outline box
  ══════════════════════════════════════ -->

  <!-- Element box outline — left & right sides solid -->
  <line x1="204" y1="182" x2="204" y2="222" stroke="#111" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="270" y1="182" x2="270" y2="222" stroke="#111" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Top edge — broken in middle (gap shows the break) -->
  <line x1="204" y1="182" x2="224" y2="182" stroke="#111" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="250" y1="182" x2="270" y2="182" stroke="#111" stroke-width="6.5" stroke-linecap="round"/>
  <!-- gap 224→250 is the break -->

  <!-- Bottom edge — offset, showing displacement -->
  <line x1="204" y1="226" x2="228" y2="226" stroke="#111" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="248" y1="220" x2="270" y2="220" stroke="#111" stroke-width="6.5" stroke-linecap="round"/>
  <!-- bottom-right piece dropped lower, simulating a break -->

  <!-- Crack / lightning bolt through the gap -->
  <path d="M236 175 L228 196 L237 196 L229 212"
    fill="none" stroke="#111" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- XPath / selector dots showing the locator is lost -->
  <circle cx="219" cy="202" r="4" fill="#111"/>
  <circle cx="237" cy="202" r="4" fill="#111"/>
  <circle cx="255" cy="202" r="4" fill="#111"/>

  <!-- ── Antenna-style lines radiating from circle (like VulZoo) ── -->
  <!-- top left antenna -->
  <line x1="225" y1="97" x2="207" y2="70" stroke="#111" stroke-width="10" stroke-linecap="round"/>
  <!-- top right antenna -->
  <line x1="275" y1="97" x2="293" y2="70" stroke="#111" stroke-width="10" stroke-linecap="round"/>

  <!-- left side legs -->
  <line x1="130" y1="193" x2="100" y2="181" stroke="#111" stroke-width="10" stroke-linecap="round"/>
  <line x1="128" y1="222" x2="98"  y2="233" stroke="#111" stroke-width="10" stroke-linecap="round"/>
  <line x1="133" y1="250" x2="106" y2="267" stroke="#111" stroke-width="10" stroke-linecap="round"/>

  <!-- right side legs -->
  <line x1="370" y1="193" x2="400" y2="181" stroke="#111" stroke-width="10" stroke-linecap="round"/>
  <line x1="372" y1="222" x2="402" y2="233" stroke="#111" stroke-width="10" stroke-linecap="round"/>
  <line x1="367" y1="250" x2="394" y2="267" stroke="#111" stroke-width="10" stroke-linecap="round"/>

  <!-- ── Bottom dots (accent) ── -->
  <circle cx="222" cy="365" r="7.5" fill="#111"/>
  <circle cx="250" cy="374" r="7.5" fill="#111"/>
  <circle cx="278" cy="365" r="7.5" fill="#111"/>

  <!-- ══════════════════════════════════════
       WORDMARK
  ══════════════════════════════════════ -->
  <text x="250" y="456"
    font-family="'Arial Black', 'Arial Bold', 'Helvetica Neue', Arial, sans-serif"
    font-size="60" font-weight="900" fill="#111" text-anchor="middle" letter-spacing="5">
    REPRO
  </text>
  <text x="250" y="525"
    font-family="'Arial Black', 'Arial Bold', 'Helvetica Neue', Arial, sans-serif"
    font-size="60" font-weight="900" fill="#111" text-anchor="middle" letter-spacing="5">
    BREAK
  </text>
</svg>
